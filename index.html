<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Emails - Bradesco México</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .wrapper { max-width: 1300px; margin: 0 auto; }
        h1 { text-align: center; color: #CC092F; font-size: 26px; margin-bottom: 20px; }
        .container { display: flex; gap: 20px; }

        h2 { margin-top: 0; color: #4a4a4a; font-size: 18px; border-bottom: 2px solid #f4f4f4; padding-bottom: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #555; }
        input[type="text"], input[type="url"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 80px; resize: vertical; }
        button { padding: 12px; background: #CC092F; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #a60725; }
        .tabs { display: flex; border-bottom: 1px solid #ccc; }
        .tab { padding: 10px 20px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-bottom: none; border-radius: 4px 4px 0 0; font-weight: bold; margin-right: 5px; }
        .tab.active { background: white; border-bottom: 1px solid white; color: #CC092F; }
        .tab-content { display: none; background: white; padding: 15px; border: 1px solid #ccc; border-top: none; border-radius: 0 0 4px 4px; flex-grow: 1; }
        .tab-content.active { display: block; }
        pre { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; font-family: monospace; font-size: 13px; margin: 0; height: 450px; overflow-y: auto; }
        iframe { width: 100%; height: 500px; border: 1px solid #ccc; border-radius: 4px; background: #F4F4F4; }

                </div>

                    <label>Contenido Bloque Destacado:</label>
                    <textarea id="contenido_destacado">Monitoreo 24/7 de tus movimientos bancarios.<br>Acceso simplificado desde cualquier dispositivo.</textarea>
                </div>
                
                <div class="form-group">
                    <label>Contenido Principal:</label>
                    <textarea id="contenido_principal" style="height: 110px;">Recuerda que Bradesco México nunca solicitará tus contraseñas o datos confidenciales por correo electrónico o llamada telefónica. Mantén tus credenciales seguras.</textarea>
                </div>

                <div class="form-group">
                    <label>URL Imagen Secundaria (Opcional):</label>
                    <input type="url" id="imagen_secundaria" value="https://placeholder.com">
                </div>

                <div class="form-group">
                    <label>Texto del Botón:</label>
                    <input type="text" id="texto_boton" value="Conocer más aquí">
                </div>
                
                <div class="form-group">
                    <label>Enlace del Botón (URL):</label>
                    <input type="url" id="url_boton" value="https://bradesco.com.mx">
                </div>
                
                <button onclick="procesarPlantilla()">Actualizar y Generar HTML</button>
            </div>

            <!-- Panel de Resultados Integrado con Pestañas (Derecha) -->
            <div class="panel-output">
                <div class="tabs">
                    <div class="tab active" onclick="cambiarPestaña('vista-previa')">👁️ Vista Previa Visual</div>
                    <div class="tab" onclick="cambiarPestaña('codigo-fuente')">💻 Código HTML Final</div>
                </div>

                <!-- Contenido de Vista Previa -->
                <div id="vista-previa" class="tab-content active">
                    <iframe id="preview-iframe"></iframe>
                </div>

                <!-- Contenido de Código Fuente -->
                <div id="codigo-fuente" class="tab-content">
                    <button class="copy-btn" onclick="copiarAlPortapapeles()">📋 Copiar Código</button>
                    <pre id="resultado-codigo">Haz clic en "Actualizar y Generar HTML" para cargar el código.</pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Función para cambiar de pestañas en la interfaz
        function cambiarPestaña(idPestaña) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById(idPestaña).classList.add('active');
        }

        // Función encargada del reemplazo dinámico de los campos en tu código HTML
        function procesarPlantilla() {
            const data = {
                hero_image: document.getElementById('hero_image').value,
                titulo: document.getElementById('titulo').value,
                subtitulo: document.getElementById('subtitulo').value,
                titulo_destacado: document.getElementById('titulo_destacado').value,
                contenido_destacado: document.getElementById('contenido_destacado').value,

                imagen_secundaria: document.getElementById('imagen_secundaria').value,
                texto_boton: document.getElementById('texto_boton').value,
                url_boton: document.getElementById('url_boton').value
            };
